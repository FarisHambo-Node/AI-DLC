# AI-DLC Agent Configuration
# -----------------------------------------------------------------------------
# Five agent types, each owning a slice of the pipeline. Each agent is a
# HarnessRuntime instance bound to a restricted skill list and adapter set.
# Model selection lives in model_routing.yaml (per task type, not per agent).

project:
  jira_project_key: "PROJ"
  github_org: "my-org"
  default_repo: "my-org/my-app"
  base_branch: "main"
  project_spec_path: "./project-spec"

agents:
  document_agent:
    enabled: true
    skills:
      - requirements_parser
      - incident_triage
    adapters: [jira, project_spec, knowledge_graph]

  coding_agent:
    enabled: true
    skills:
      - implement_feature
    adapters: [github, knowledge_graph, vector_store, project_spec]
    max_files_per_commit: 10
    branch_prefix: "feature"

  testing_agent:
    enabled: true
    skills:
      - test_generation
      - security_scan_review   # runs under judge-jury
    adapters: [github, semgrep, snyk, trivy, syft_cosign]
    min_coverage_pct: 80
    block_on_critical_finding: true

  versioning_agent:
    enabled: true
    skills:
      - pr_review
    adapters: [github, knowledge_graph]
    max_diff_chars: 60000

  devops_agent:
    enabled: true
    skills:
      - deployment_pipeline
      - incident_triage
    adapters: [github, argocd, sentry, slack]
    environments: [test, uat, production]

human_gates:
  requirements_approval:
    timeout_hours: 48
    reminder_hours: 24
    on_timeout: move_to_backlog

  pr_review:
    timeout_hours: 24
    reminder_hours: 8
    on_timeout: escalate
    min_approvals: 1

  production_deploy:
    timeout_hours: null
    on_timeout: block

architectural_review:
  # Mode 2 HIT — strategic, not per-item
  cadence: per_release       # per_release | weekly | monthly
  reviewers: [tech_lead, product_lead]
  indicators:
    - spec_vs_graph_drift
    - repeat_failure_heatmap
    - cost_trend
    - agent_utilization
