# AI-DLC - Local Development Stack
# ---------------------------------------------------------------------------
# One backend service (orchestrator + queues + API). Agents are NOT separate
# containers — they run as tasks inside the backend via harness.runtime.
#
# Usage:
#   cp .env.example .env.local
#   docker compose up

services:

  # --- Infrastructure ---

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  neo4j:
    image: neo4j:5-community
    ports: ["7474:7474", "7687:7687"]
    environment:
      NEO4J_AUTH: "neo4j/localpassword"
    volumes:
      - neo4j_data:/data

  postgres:
    image: pgvector/pgvector:pg16
    ports: ["5432:5432"]
    environment:
      POSTGRES_USER: ai_dlc
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ai_dlc
    volumes:
      - pg_data:/var/lib/postgresql/data

  # --- Backend (orchestrator, queues, API, webhooks) ---

  backend:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.backend
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload
    env_file: .env.local
    ports: ["8000:8000"]
    volumes:
      - .:/app
    depends_on:
      redis:
        condition: service_healthy
      neo4j:
        condition: service_started
      postgres:
        condition: service_started

volumes:
  neo4j_data:
  pg_data:
